<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="ballGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#eeff55"/>
      <stop offset="50%"  stop-color="#c8ff00"/>
      <stop offset="100%" stop-color="#7aaa00"/>
