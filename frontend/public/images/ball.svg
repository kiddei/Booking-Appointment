  <circle cx="72" cy="30" r="5.5" fill="rgba(0,0,0,0.22)"/>

  <circle cx="17" cy="48" r="5.5" fill="rgba(0,0,0,0.22)"/>
  <circle cx="38" cy="48" r="5.5" fill="rgba(0,0,0,0.22)"/>
  <circle cx="62" cy="48" r="5.5" fill="rgba(0,0,0,0.22)"/>
  <circle cx="83" cy="48" r="5.5" fill="rgba(0,0,0,0.22)"/>

  <circle cx="28" cy="66" r="5.5" fill="rgba(0,0,0,0.22)"/>
  <circle cx="50" cy="72" r="5.5" fill="rgba(0,0,0,0.22)"/>
  <circle cx="72" cy="66" r="5.5" fill="rgba(0,0,0,0.22)"/>

